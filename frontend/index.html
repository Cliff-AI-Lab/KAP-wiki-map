<!doctype html>
<html lang="zh-CN" style="color-scheme: dark">
  <!-- KAP: 深色主题首帧即声明，避免白屏闪烁。
       主题切换时由 lib/themes.ts applyTheme() 覆盖此 inline style。 -->
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KAP · 知识智能体平台。全行业知识治理，制造能源优先，私有化部署。" />
    <title>KAP · 知识智能体平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- M21 #9 · KAP shadcn slate 字体（非阻塞渲染，font-display: swap）。Geist + Noto Sans SC + JetBrains Mono -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
