services:
  # === 书虫 API 服务（仅完整容器化部署时使用）===
  bookworm-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      NEO4J_URI: bolt://neo4j:7687
      MILVUS_HOST: milvus
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: milvus-minio:9000
    depends_on:
      - postgres
      - neo4j
      - milvus
      - redis
    restart: unless-stopped
    profiles:
      - full

  # === PostgreSQL（仅完整容器化部署或无本地 PG 时使用）===
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookworm
      POSTGRES_USER: bookworm
      POSTGRES_PASSWORD: bookworm123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    profiles:
      - full

  # === 以下为基础设施，本地开发默认启动 ===
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/bookworm123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    restart: unless-stopped

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcddata:/etcd

  milvus-minio:
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/minio_data

  milvus:
    image: milvusdb/milvus:v2.4.17
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvusdata:/var/lib/milvus
    depends_on:
      - milvus-etcd
      - milvus-minio

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
  neo4jdata:
  etcddata:
  miniodata:
  milvusdata:
