# M21 #1 · 三块独立部署 nginx 网关
#
# 路径分发：
#   /api/v1/architect/*           → 咨询中心 :8011
#   /api/v1/ontology/*  /governance/* /wiki/* /projects/* /knowledge/*
#                                  → 知识中心 :8012
#   /api/v1/qa/* /observability/*  → 消费中心 :8013
#   /                              → 默认到知识中心 SPA（治理面板）

events { worker_connections 1024; }

http {
    upstream kap_architect { server kap-architect:8011; keepalive 16; }
    upstream kap_storage   { server kap-storage:8012;   keepalive 32; }
    upstream kap_portal    { server kap-portal:8013;    keepalive 32; }

    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name kap.local;

        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;

        client_max_body_size 200M;

        # 咨询中心
        location ~ ^/api/v1/architect(/|$) {
            proxy_pass http://kap_architect;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # 知识中心（治理 + 本体 + Wiki + 图谱 + 项目 + 文档）
        location ~ ^/api/v1/(ontology|governance|wiki|projects|knowledge|sensitive|rebuild|audit|analysis)(/|$) {
            proxy_pass http://kap_storage;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # 消费中心（QA + 观察 + 召回测试 + ISS-Job）
        location ~ ^/api/v1/(qa|observability|recall-test|iss-job)(/|$) {
            proxy_pass http://kap_portal;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }

        # 健康检查 (3 块各自的 /health)
        location = /health/architect { proxy_pass http://kap_architect/health; }
        location = /health/storage   { proxy_pass http://kap_storage/health; }
        location = /health/portal    { proxy_pass http://kap_portal/health; }

        # 默认前端：到知识中心 SPA
        location / {
            proxy_pass http://kap_storage;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
