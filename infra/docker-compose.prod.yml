name: kap-prod

# 生产部署 compose（M19 #5 部署收口）
#
# 与 dev 差异：
# - 不暴露 PG / Redis 端口到宿主机（仅 net 内）
# - Neo4j 上 4G 内存限制 + 持久化分卷分离
# - kap-api 4 副本 + 资源限制 + healthcheck
# - 仅 :443/:80 通过 nginx 上游暴露
# - 关键密钥通过 .env.prod 注入（不入仓）
#
# 启动：
#   docker compose -f infra/docker-compose.prod.yml --env-file .env.prod up -d

services:
  kap-api:
    image: kap/backend:v1.0.0-m0
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: "2"
          memory: 4G
      restart_policy:
        condition: any
        delay: 5s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    env_file:
      - ../.env.prod   # POSTGRES_PASSWORD / NEO4J_PASSWORD / IRUIDONG_API_KEY 等
    environment:
      KAP_ENV: prod
      POSTGRES_HOST: kap-postgres
      NEO4J_URI: bolt://kap-neo4j:7687
      MILVUS_HOST: kap-milvus
      REDIS_URL: redis://kap-redis:6379/0
      MINIO_ENDPOINT: kap-minio:9000
      # M19 #1 + M20 #1 启用所有 observability PG 持久化
      KAP_WIKI_QUALITY_PG: "1"
      KAP_EXTRACTION_QUALITY_PG: "1"
      KAP_DECISION_LOG_PG: "1"
      KAP_QUERY_LOG_PG: "1"
      KAP_RECALL_EVAL_PG: "1"
      KAP_PROMPT_VER_PG: "1"
    depends_on:
      - kap-postgres
      - kap-neo4j
      - kap-milvus
      - kap-redis
    networks:
      - kap-net

  kap-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kap
      POSTGRES_USER: kap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro    # 启动 SQL（含分区）
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    restart: unless-stopped
    networks:
      - kap-net   # 不暴露端口

  kap-neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 2G
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    restart: unless-stopped
    networks:
      - kap-net

  kap-milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.16
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcddata:/etcd
    networks:
      - kap-net

  kap-minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - miniodata:/minio_data
    networks:
      - kap-net

  kap-milvus:
    image: milvusdb/milvus:v2.4.17
    command: milvus run standalone
    environment:
      ETCD_ENDPOINTS: kap-milvus-etcd:2379
      MINIO_ADDRESS: kap-minio:9000
    volumes:
      - milvusdata:/var/lib/milvus
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
    depends_on:
      - kap-milvus-etcd
      - kap-minio
    restart: unless-stopped
    networks:
      - kap-net

  kap-redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - kap-net

  kap-nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tls:/etc/nginx/tls:ro
    depends_on:
      - kap-api
    restart: unless-stopped
    networks:
      - kap-net

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
  etcddata:
  miniodata:
  milvusdata:
  redisdata:

networks:
  kap-net:
    driver: bridge
